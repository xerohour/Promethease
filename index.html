<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promethease Reports</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --vw-pink: #ff4fd8;
      --vw-cyan: #44f3ff;
      --vw-blue: #12244a;
      --vw-dark: #090014;
      --vw-text: #e6f8ff;
    }

    body {
      min-height: 100vh;
      color: var(--vw-text);
      font-family: "Space Mono", monospace;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 79, 216, 0.35), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(68, 243, 255, 0.3), transparent 32%),
        linear-gradient(180deg, #1e1142 0%, #100423 45%, #090014 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 100% 3px;
      pointer-events: none;
      opacity: 0.25;
      z-index: 1;
    }

    #matrix-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #trippy-3d {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.55;
    }

    .vapor-card {
      background: rgba(9, 0, 20, 0.68);
      border: 1px solid rgba(68, 243, 255, 0.35);
      box-shadow: 0 0 26px rgba(68, 243, 255, 0.2), 0 0 40px rgba(255, 79, 216, 0.2);
      backdrop-filter: blur(5px);
    }

    h1 {
      font-family: "Monoton", cursive;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(68, 243, 255, 0.8), 0 0 16px rgba(255, 79, 216, 0.6);
    }

    .subtitle {
      color: #caecff;
    }

    .btn-vapor {
      border: 1px solid rgba(68, 243, 255, 0.7);
      background: linear-gradient(90deg, rgba(255, 79, 216, 0.2), rgba(68, 243, 255, 0.2));
      color: #f4fdff;
    }

    .btn-vapor:hover {
      border-color: var(--vw-pink);
      color: #fff;
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.5);
    }

    .pic-grid {
      margin-top: 2rem;
    }

    .vapor-pic {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 15px rgba(68, 243, 255, 0.22);
      filter: saturate(1.2) contrast(1.05);
    }

    main {
      position: relative;
      z-index: 2;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
</head>
<body>
  <canvas id="matrix-bg" aria-hidden="true"></canvas>
  <canvas id="trippy-3d" aria-hidden="true"></canvas>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card vapor-card border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3">Promethease Reports</h1>
            <p class="subtitle mb-4">
              Select a report to open:
            </p>
            <div class="d-grid gap-3">
              <a class="btn btn-vapor btn-lg text-start" href="Promethease_2015_02_07_genome_John_Stinson_Full_20150207073317_ui2.html">
                John Stinson Report
              </a>
              <a class="btn btn-vapor btn-lg text-start" href="Promethease_2015_02_07_genome_Trina_Toohey_Full_20150207073527_ui2.html">
                Trina Toohey Report
              </a>
              <a class="btn btn-vapor btn-lg text-start" href="all-reports.html">
                All Report Versions
              </a>
            </div>
            <div class="mt-4">
              <p class="subtitle mb-2">Soundtrack</p>
              <audio controls loop preload="none" class="w-100">
                <source src="matrix-soundtrack.mp3" type="audio/mpeg" />
                Your browser does not support the audio element.
              </audio>
            </div>
            <div class="row g-3 pic-grid">
              <div class="col-12 col-md-4"><img class="vapor-pic" id="pic1" alt="Random vaporwave-style image 1" /></div>
              <div class="col-12 col-md-4"><img class="vapor-pic" id="pic2" alt="Random vaporwave-style image 2" /></div>
              <div class="col-12 col-md-4"><img class="vapor-pic" id="pic3" alt="Random vaporwave-style image 3" /></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function startTrippy3D() {
      if (!window.THREE) return;
      const canvas = document.getElementById("trippy-3d");
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 38);

      const ambient = new THREE.AmbientLight(0x77aaff, 0.7);
      const pointA = new THREE.PointLight(0xff44dd, 1.4, 220);
      const pointB = new THREE.PointLight(0x44f3ff, 1.3, 220);
      pointA.position.set(22, 16, 24);
      pointB.position.set(-22, -8, 18);
      scene.add(ambient, pointA, pointB);

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function createMobiusMesh() {
        const uSteps = 120;
        const vSteps = 20;
        const positions = [];
        const indices = [];
        for (let i = 0; i <= uSteps; i += 1) {
          const u = (i / uSteps) * Math.PI * 2;
          for (let j = 0; j <= vSteps; j += 1) {
            const v = -1 + (j / vSteps) * 2;
            const x = (8 + (v * 2) * Math.cos(u / 2)) * Math.cos(u);
            const y = (8 + (v * 2) * Math.cos(u / 2)) * Math.sin(u);
            const z = (v * 2) * Math.sin(u / 2);
            positions.push(x, y, z);
          }
        }
        for (let i = 0; i < uSteps; i += 1) {
          for (let j = 0; j < vSteps; j += 1) {
            const a = i * (vSteps + 1) + j;
            const b = a + vSteps + 1;
            indices.push(a, b, a + 1, b, b + 1, a + 1);
          }
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geo.setIndex(indices);
        geo.computeVertexNormals();
        const mat = new THREE.MeshStandardMaterial({
          color: 0x88fffd,
          metalness: 0.35,
          roughness: 0.3,
          transparent: true,
          opacity: 0.8,
          emissive: 0x221133
        });
        return new THREE.Mesh(geo, mat);
      }

      function createFractalCluster() {
        const group = new THREE.Group();
        const base = new THREE.IcosahedronGeometry(2.2, 0);
        for (let i = 0; i < 36; i += 1) {
          const hue = Math.floor(rand(0, 360));
          const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(`hsl(${hue}, 100%, 60%)`),
            emissive: new THREE.Color(`hsl(${hue}, 100%, 20%)`),
            metalness: 0.25,
            roughness: 0.45
          });
          const mesh = new THREE.Mesh(base, mat);
          const radius = rand(3, 14);
          const theta = rand(0, Math.PI * 2);
          const phi = rand(0, Math.PI);
          mesh.position.set(
            radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
          );
          const s = rand(0.25, 1.1);
          mesh.scale.setScalar(s);
          group.add(mesh);
        }
        return group;
      }

      function createTorusKnot() {
        const geo = new THREE.TorusKnotGeometry(7.5, 1.7, 240, 32, 3, 5);
        const mat = new THREE.MeshStandardMaterial({
          color: 0xff66cc,
          emissive: 0x220022,
          metalness: 0.55,
          roughness: 0.25,
          wireframe: Math.random() > 0.5
        });
        return new THREE.Mesh(geo, mat);
      }

      const builders = [createMobiusMesh, createFractalCluster, createTorusKnot];
      const chosen = builders.sort(() => Math.random() - 0.5).slice(0, 2).map((build) => build());
      chosen.forEach((obj, idx) => {
        obj.position.x = idx === 0 ? -11 : 11;
        obj.rotation.x = rand(0, Math.PI);
        obj.rotation.y = rand(0, Math.PI);
        scene.add(obj);
      });

      const coreGeo = new THREE.OctahedronGeometry(4, 2);
      const coreMat = new THREE.MeshStandardMaterial({
        color: 0x66ffff,
        emissive: 0x112244,
        metalness: 0.45,
        roughness: 0.35,
        wireframe: true
      });
      const core = new THREE.Mesh(coreGeo, coreMat);
      scene.add(core);

      function animate() {
        const t = performance.now() * 0.001;
        pointA.position.x = Math.cos(t * 0.7) * 24;
        pointA.position.y = 10 + Math.sin(t * 0.9) * 8;
        pointB.position.x = Math.sin(t * 0.6) * -24;
        pointB.position.y = -6 + Math.cos(t * 0.8) * 10;

        chosen.forEach((obj, i) => {
          obj.rotation.x += 0.003 + i * 0.0012;
          obj.rotation.y += 0.004 + i * 0.001;
          obj.position.y = Math.sin(t * (0.7 + i * 0.2)) * 2.4;
        });

        core.rotation.x += 0.008;
        core.rotation.y -= 0.01;
        core.material.color.setHSL((t * 0.08) % 1, 1, 0.67);
        camera.position.x = Math.sin(t * 0.25) * 3.2;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    })();

    (function startMatrixRain() {
      const canvas = document.getElementById("matrix-bg");
      const ctx = canvas.getContext("2d");
      const glyphs = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>[]{}";
      const fontSize = 16;
      let columns = 0;
      let drops = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.ceil(canvas.width / fontSize);
        drops = Array.from({ length: columns }, () => Math.random() * (canvas.height / fontSize));
      }

      function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = `${fontSize}px "Space Mono", monospace`;
        ctx.textBaseline = "top";

        const t = Date.now() * 0.05;
        for (let i = 0; i < columns; i += 1) {
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          const glyph = glyphs.charAt(Math.floor(Math.random() * glyphs.length));
          const hue = (t + (i / columns) * 360) % 360;
          ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
          ctx.fillText(glyph, x, y);

          if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += 0.8 + Math.random() * 0.6;
        }
      }

      resize();
      window.addEventListener("resize", resize);
      setInterval(draw, 50);
    })();

    (function setRandomImages() {
      const ids = ["pic1", "pic2", "pic3"];
      ids.forEach((id, i) => {
        const seed = Math.floor(Math.random() * 1000000) + i;
        const el = document.getElementById(id);
        if (el) el.src = `https://picsum.photos/seed/${seed}/600/400`;
      });
    })();
  </script>
</body>
</html>
