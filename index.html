<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promethease Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="openai-brand.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0e0f12; /* Match --oa-charcoal */
      color: var(--oa-mist);
      margin: 0;
      overflow-x: hidden;
    }
    #three-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .brand-card {
      background: rgba(32, 33, 35, 0.82);
      border: 1px solid var(--oa-graphite);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }
    .brand-subtitle {
      color: var(--oa-steel);
    }
    .btn-brand {
      border-color: var(--oa-green);
      color: var(--oa-mist);
      background: linear-gradient(90deg, rgba(16, 163, 127, 0.16), rgba(43, 143, 255, 0.12));
      text-align: left;
    }
    .btn-brand:hover {
      border-color: var(--oa-azure);
      color: #fff;
      background: linear-gradient(90deg, rgba(16, 163, 127, 0.3), rgba(43, 143, 255, 0.24));
    }
    .audio-label {
      color: var(--oa-steel);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <canvas id="three-bg"></canvas>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <section class="brand-card rounded-4 p-4 p-md-5">
          <h1 class="h3 mb-2">Promethease Reports</h1>
          <p class="brand-subtitle mb-4">Select a report to open.</p>

          <div class="d-grid gap-3">
            <a class="btn btn-brand btn-lg" href="Promethease_2015_02_07_genome_John_Stinson_Full_20150207073317_ui2.html">John Stinson Report</a>
            <a class="btn btn-brand btn-lg" href="Promethease_2015_02_07_genome_Trina_Toohey_Full_20150207073527_ui2.html">Trina Toohey Report</a>
            <a class="btn btn-brand btn-lg" href="all-reports.html">All Report Versions</a>
          </div>

          <div class="mt-4">
            <p class="audio-label mb-2">Soundtrack</p>
            <audio controls loop preload="none" class="w-100">
              <source src="matrix-soundtrack.mp3" type="audio/mpeg" />
              Your browser does not support the audio element.
            </audio>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script type="module">
    import * as THREE from './three.module.js';

    let camera, scene, renderer;
    let particles;

    init();
    animate();

    function init() {
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.z = 1000;

        scene = new THREE.Scene();

        const particleCount = 5000;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() * 2 - 1) * 3000;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0x888888,
            size: 2,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        particles = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particles);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-bg'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.00005;

        particles.rotation.x = time * 0.25;
        particles.rotation.y = time * 0.5;

        renderer.render(scene, camera);
    }
  </script>
</body>
</html>
