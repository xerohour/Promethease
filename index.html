<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promethease Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="openai-brand.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0e0f12; /* Match --oa-charcoal */
      color: var(--oa-mist);
      margin: 0;
      overflow-x: hidden;
    }
    #dna-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .brand-card {
      background: rgba(32, 33, 35, 0.82);
      border: 1px solid var(--oa-graphite);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }
    .brand-subtitle {
      color: var(--oa-steel);
    }
    .btn-brand {
      border-color: var(--oa-green);
      color: var(--oa-mist);
      background: linear-gradient(90deg, rgba(16, 163, 127, 0.16), rgba(43, 143, 255, 0.12));
      text-align: left;
    }
    .btn-brand:hover {
      border-color: var(--oa-azure);
      color: #fff;
      background: linear-gradient(90deg, rgba(16, 163, 127, 0.3), rgba(43, 143, 255, 0.24));
    }
    .audio-label {
      color: var(--oa-steel);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <canvas id="dna-bg"></canvas>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <section class="brand-card rounded-4 p-4 p-md-5">
          <h1 class="h3 mb-2">Promethease Reports</h1>
          <p class="brand-subtitle mb-4">Select a report to open.</p>

          <div class="d-grid gap-3">
            <a class="btn btn-brand btn-lg" href="Promethease_2015_02_07_genome_John_Stinson_Full_20150207073317_ui2.html">John Stinson Report</a>
            <a class="btn btn-brand btn-lg" href="Promethease_2015_02_07_genome_Trina_Toohey_Full_20150207073527_ui2.html">Trina Toohey Report</a>
            <a class="btn btn-brand btn-lg" href="all-reports.html">All Report Versions</a>
          </div>

          <div class="mt-4">
            <p class="audio-label mb-2">Soundtrack</p>
            <audio controls loop preload="none" class="w-100">
              <source src="matrix-soundtrack.mp3" type="audio/mpeg" />
              Your browser does not support the audio element.
            </audio>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script>
    (function initDNAHelix() {
      const canvas = document.getElementById('dna-bg');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 100;

      const group = new THREE.Group();
      scene.add(group);

      const material1 = new THREE.MeshBasicMaterial({ color: 0x10a37f }); // oa-green
      const material2 = new THREE.MeshBasicMaterial({ color: 0x2b8fff }); // oa-azure
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x40434a, opacity: 0.5, transparent: true });

      const spheres = [];
      const lines = [];
      const numPoints = 40;
      const radius = 15;
      const heightStep = 4;
      const twistStep = 0.4;

      for (let i = 0; i < numPoints; i++) {
        const y = (i - numPoints / 2) * heightStep;
        const angle = i * twistStep;

        // Strand 1
        const s1 = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), material1);
        s1.position.set(radius * Math.cos(angle), y, radius * Math.sin(angle));
        group.add(s1);
        spheres.push(s1);

        // Strand 2
        const s2 = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), material2);
        s2.position.set(radius * Math.cos(angle + Math.PI), y, radius * Math.sin(angle + Math.PI));
        group.add(s2);
        spheres.push(s2);

        // Connect them
        if (i % 2 === 0) {
          const geo = new THREE.BufferGeometry().setFromPoints([s1.position, s2.position]);
          const line = new THREE.Line(geo, lineMaterial);
          group.add(line);
          lines.push({ line, s1, s2 });
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        group.rotation.y += 0.01;
        group.rotation.x += 0.005;

        // Update lines
        lines.forEach(l => {
          l.line.geometry.setFromPoints([l.s1.position, l.s2.position]);
        });

        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    })();
  </script>
</body>
</html>
