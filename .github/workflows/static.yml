# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build publish artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site

          # Publish only site assets and report bundles needed by GitHub Pages.
          rsync -a \
            --include='/index.html' \
            --include='/all-reports.html' \
            --include='/openai-brand.css' \
            --include='/matrix-soundtrack.mp3' \
            --include='/matrix-theme.mid' \
            --include='/Promethease_*' \
            --include='/2018-promethease/***' \
            --include='/2024-promethease/***' \
            --include='/2026-promethease-john/***' \
            --include='/2026-promethease-trina/***' \
            --exclude='*' \
            ./ _site/

          du -sh _site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
