<!doctype html>
<html lang="en">
<head>
  <meta name="color-scheme" content="dark" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promethease 2026 UI2 Report - Trina Toohey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../openai-brand.css">
  <link rel="stylesheet" href="ui2libs/bootstrap-3.3.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="ui2libs/jasny-bootstrap/css/jasny-bootstrap.min.css">
  <link rel="stylesheet" href="ui2libs/intro.js-2.1.0-fix1/introjs.css">
  <style>
    body { background: var(--oa-charcoal); color: var(--oa-mist); }
    .navbar { margin-bottom: 10px; }
    #pagecontent { padding: 15px; }
    #controls { padding: 12px; background: var(--oa-slate); border-left: 1px solid var(--oa-graphite); overflow-y: auto; }
    #controls .form-group { margin-bottom: 12px; }
    #controls .control-label { margin-bottom: 6px; font-size: 12px; color: var(--oa-steel); }
    .summary { margin-bottom: 10px; color: var(--oa-steel); }
    .table-wrap { max-height: calc(100vh - 170px); overflow: auto; border: 1px solid var(--oa-graphite); background: #18191d; }
    .table thead th { position: sticky; top: 0; background: #18191d; z-index: 2; color: var(--oa-mist); }
    .table, .table>tbody>tr>td { color: var(--oa-mist); }
    .chip { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; display: inline-block; }
    .rep-good { background: rgba(16, 163, 127, 0.22); color: #70ebcc; }
    .rep-bad { background: rgba(212, 84, 100, 0.28); color: #ffccd4; }
    .rep-na { background: rgba(158, 161, 170, 0.2); color: #d3d6dc; }
    .navbar-default { background-color: #16171b; border-color: var(--oa-graphite); }
    .navbar-default .navbar-brand, .navbar-default .navbar-nav>li>a { color: var(--oa-mist); }
    .btn-default { background: #18191d; color: var(--oa-mist); border-color: var(--oa-graphite); }
    .btn-default:hover { background: rgba(43, 143, 255, 0.16); color: #fff; border-color: var(--oa-azure); }
    a { color: var(--oa-azure); }
    a:hover { color: var(--oa-green); }
    .form-control, .form-control:focus {
      background: #121317;
      color: var(--oa-mist);
      border-color: var(--oa-graphite);
    }
    .close { color: var(--oa-mist); opacity: 0.75; }
    .close:hover { color: #fff; opacity: 1; }
  </style>
<script src="https://cdn.jsdelivr.net/npm/darkreader@4.9.58/darkreader.min.js"></script>
<script>
    // Enable dark mode by default
    DarkReader.setFetchMethod(window.fetch);
    DarkReader.enable({
        brightness: 100,
        contrast: 90,
        sepia: 10
    });
</script>
  <link rel="stylesheet" href="../openai-brand.css" />
</head>
<body>
  <div id="controls" class="navmenu navmenu-default navmenu-fixed-right offcanvas col-lg-3 col-md-4 col-sm-5 col-xs-12 in canvas-slid">
    <button id="btn_controls_close" type="button" class="close" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    <h4 style="margin-top:0;">Search + Filters</h4>
    <div class="form-group">
      <label class="control-label" for="textfilter">Text Search</label>
      <input type="text" class="search-query form-control" id="textfilter" placeholder="Search rsID, genotype, gene, summary">
    </div>
    <div class="form-group">
      <label class="control-label" for="repute">Repute</label>
      <select id="repute" class="form-control">
        <option value="">All</option>
        <option value="Good">Good</option>
        <option value="Bad">Bad</option>
        <option value="Not Set">Not Set</option>
      </select>
    </div>
    <div class="form-group">
      <label class="control-label" for="minMag">Minimum Magnitude</label>
      <input id="minMag" type="number" min="0" step="0.1" class="form-control" placeholder="0.0">
    </div>
    <button id="resetbutton" class="btn btn-default btn-sm">Reset</button>
    <button id="helpbutton" class="btn btn-default btn-sm">Help</button>
  </div>

  <div id="pagecontent" class="canvas-slid">
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <div class="navbar-header">
          <button id="controls-button" type="button" class="navbar-toggle" data-toggle="offcanvas" data-target="#controls" data-canvas="#pagecontent">
            <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
          </button>
          <span class="navbar-brand">Promethease 2026 UI2 - Trina Toohey</span>
        </div>
        <div class="nav navbar-nav navbar-right" style="padding:8px 15px;">
          <button id="controls-button-desktop" type="button" class="btn btn-default btn-sm" data-toggle="offcanvas" data-target="#controls" data-canvas="#pagecontent">Filters</button>
          <a class="btn btn-default btn-sm" href="report-tools.html">Report Tools</a>
          <a class="btn btn-default btn-sm" href="genetic-genie.html">Genetic Genie Panels</a>
        </div>
      </div>
    </nav>

    <div class="summary">
      Generated on 2026-03-03 02:01:55 UTC | Genome: genome_Trina_Toohey_v4_Full_20241214213803.txt | Findings: <span id="totalCount">0</span> | Showing: <span id="shownCount">0</span>
    </div>

    <div class="table-wrap">
      <table class="table table-striped table-condensed">
        <thead>
          <tr>
            <th>rsID</th>
            <th>Genotype</th>
            <th>Gene(s)</th>
            <th>Repute</th>
            <th>Magnitude</th>
            <th>Summary</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="ui2libs/jquery-2.1.0.min.js"></script>
  <script src="ui2libs/bootstrap-3.3.1/dist/js/bootstrap.min.js"></script>
  <script src="ui2libs/jasny-bootstrap/js/jasny-bootstrap.min.js"></script>
  <script src="ui2libs/intro.js-2.1.0-fix1/intro.js"></script>
  <script>
    var data = [];

    function esc(v) {
      if (v === null || v === undefined) return "";
      return String(v).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    function chipClass(rep) {
      if (rep === "Good") return "rep-good";
      if (rep === "Bad") return "rep-bad";
      return "rep-na";
    }

    function applyFilters() {
      var q = ($("#textfilter").val() || "").toLowerCase().trim();
      var repute = $("#repute").val();
      var minMag = Number($("#minMag").val() || 0);

      var filtered = data.filter(function (item) {
        var mag = Number(item.magnitude || 0);
        if (repute && (item.repute || "Not Set") !== repute) return false;
        if (mag < minMag) return false;

        if (q) {
          var hay = [
            item.rsid || "",
            item.genotype || "",
            (item.genes || []).join(" "),
            item.summary || "",
            item.repute || "Not Set"
          ].join(" ").toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });

      var html = filtered.map(function (item) {
        var rep = item.repute || "Not Set";
        var mag = item.magnitude === null || item.magnitude === undefined ? "" : Number(item.magnitude).toFixed(2);
        var snpUrl = "https://www.snpedia.com/index.php/" + encodeURIComponent(item.rsid || "");
        return "<tr>" +
          "<td><a href=\"" + snpUrl + "\" target=\"_blank\" rel=\"noreferrer\">" + esc(item.rsid || "") + "</a></td>" +
          "<td>" + esc(item.genotype || "") + "</td>" +
          "<td>" + esc((item.genes || []).join(", ")) + "</td>" +
          "<td><span class=\"chip " + chipClass(rep) + "\">" + esc(rep) + "</span></td>" +
          "<td>" + esc(mag) + "</td>" +
          "<td>" + esc(item.summary || "") + "</td>" +
          "</tr>";
      }).join("");

      $("#rows").html(html);
      $("#shownCount").text(filtered.length.toLocaleString());
      $("#totalCount").text(data.length.toLocaleString());
    }

    function resetControls() {
      $("#textfilter").val("");
      $("#repute").val("");
      $("#minMag").val("");
      applyFilters();
    }

    function startHelp() {
      if (!window.introJs) return;
      introJs().setOptions({
        steps: [
          { intro: "Use this panel to search and filter like the classic Promethease layout." },
          { element: document.querySelector("#textfilter"), intro: "Type text to live-filter findings." },
          { element: document.querySelector("#repute"), intro: "Narrow by repute value." },
          { element: document.querySelector("#minMag"), intro: "Set a minimum magnitude." }
        ]
      }).start();
    }

    $(function () {
      $("#controls").offcanvas({ autohide: false, disableScrolling: false, recalc: false });
      $("#btn_controls_close").on("click", function () { $("#controls").offcanvas("hide"); });
      $("#resetbutton").on("click", resetControls);
      $("#helpbutton").on("click", startHelp);
      $("#textfilter").on("input", applyFilters);
      $("#repute,#minMag").on("change input", applyFilters);

      fetch("promethease_data/Promethease_2026_03_03_genome_Trina_Toohey_Full_20260303020155_findings_2026.json")
        .then(function (r) { return r.json(); })
        .then(function (j) {
          data = Array.isArray(j.findings) ? j.findings : [];
          applyFilters();
        })
        .catch(function () {
          $("#rows").html("<tr><td colspan=\"6\">Could not load findings JSON.</td></tr>");
        });
    });
  </script>
</body>
</html>
