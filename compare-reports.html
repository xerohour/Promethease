<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Compare Reports - Promethease</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/darkreader@4.9.58/darkreader.min.js"></script>
  <script>
    DarkReader.setFetchMethod(window.fetch);
    DarkReader.enable({
        brightness: 100,
        contrast: 90,
        sepia: 10
    });
  </script>
  <link rel="stylesheet" href="openai-brand.css" />
  <style>
    body {
      background: linear-gradient(160deg, var(--oa-charcoal) 0%, #17181d 50%, var(--oa-slate) 100%);
      color: var(--oa-mist);
      min-height: 100vh;
    }
    .panel {
      background: rgba(32, 33, 35, 0.82);
      border: 1px solid var(--oa-graphite);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    a {
      color: var(--oa-azure);
      text-decoration: none;
    }
    a:hover {
      color: var(--oa-green);
      text-decoration: underline;
    }
    .btn-brand {
      border-color: var(--oa-green);
      color: var(--oa-mist);
    }
    .btn-brand:hover {
      border-color: var(--oa-azure);
      color: #fff;
      background: rgba(43, 143, 255, 0.1);
    }
    .report-select {
      background: var(--oa-slate);
      color: var(--oa-mist);
      border: 1px solid var(--oa-graphite);
    }
    .report-select:focus {
      border-color: var(--oa-azure);
      box-shadow: 0 0 0 2px rgba(43, 143, 255, 0.2);
    }
    .status-identical {
      background: rgba(16, 163, 127, 0.2);
      color: #10a37f;
      border: 1px solid #10a37f;
    }
    .status-different {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid #ffc107;
    }
    .status-unique {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }
    .loading-spinner {
      border: 3px solid var(--oa-graphite);
      border-top: 3px solid var(--oa-green);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .results-table th {
      background: var(--oa-charcoal);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .results-table td {
      vertical-align: middle;
    }
    .results-table {
      max-height: 500px;
      overflow-y: auto;
    }
    .filter-btn.active {
      background: var(--oa-green);
      color: white;
      border-color: var(--oa-green);
    }
    .badge-status {
      padding: 0.35rem 0.65rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="oa-mobile-stack mb-4">
      <h1 class="h3 m-0">Compare Reports</h1>
      <a class="btn btn-outline-light btn-brand" href="index.html">Back to Main Index</a>
    </div>

    <!-- Report Selection Panel -->
    <section class="panel rounded p-4 mb-4">
      <h2 class="h5 mb-3">Select Reports to Compare</h2>
      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label for="reportA" class="form-label">Report A</label>
          <select id="reportA" class="form-select report-select">
            <option value="">Select first report...</option>
            <optgroup label="2026 Reports">
              <option value="2026-promethease-john">John Stinson (2026)</option>
              <option value="2026-promethease-trina">Trina Toohey (2026)</option>
            </optgroup>
          </select>
        </div>
        <div class="col-md-2 text-center">
          <span class="text-muted">vs</span>
        </div>
        <div class="col-md-5">
          <label for="reportB" class="form-label">Report B</label>
          <select id="reportB" class="form-select report-select">
            <option value="">Select second report...</option>
            <optgroup label="2026 Reports">
              <option value="2026-promethease-john">John Stinson (2026)</option>
              <option value="2026-promethease-trina">Trina Toohey (2026)</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="mt-4 text-center">
        <button id="compareBtn" class="btn btn-brand btn-lg" disabled>
          Compare Reports
        </button>
      </div>
    </section>

    <!-- Loading Indicator -->
    <section id="loadingSection" class="panel rounded p-4 mb-4 d-none">
      <div class="text-center py-4">
        <div class="loading-spinner mx-auto mb-3"></div>
        <p class="mb-0">Loading report data...</p>
      </div>
    </section>

    <!-- Error Message -->
    <section id="errorSection" class="panel rounded p-4 mb-4 d-none">
      <div class="alert alert-danger mb-0" role="alert">
        <h4 class="alert-heading">Error</h4>
        <p id="errorMessage" class="mb-0"></p>
      </div>
    </section>

    <!-- Results Panel -->
    <section id="resultsSection" class="panel rounded p-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h2 class="h5 mb-0">Comparison Results</h2>
        <button id="exportBtn" class="btn btn-brand">
          Export to CSV
        </button>
      </div>

      <!-- Summary Stats -->
      <div id="summaryStats" class="mb-4">
        <div class="row text-center g-3">
          <div class="col-4">
            <div class="p-3 rounded status-identical">
              <div class="h4 mb-0" id="identicalCount">0</div>
              <small>Identical</small>
            </div>
          </div>
          <div class="col-4">
            <div class="p-3 rounded status-different">
              <div class="h4 mb-0" id="differentCount">0</div>
              <small>Different</small>
            </div>
          </div>
          <div class="col-4">
            <div class="p-3 rounded status-unique">
              <div class="h4 mb-0" id="uniqueCount">0</div>
              <small>Unique</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter Buttons -->
      <div class="mb-3 d-flex gap-2 flex-wrap" role="group" aria-label="Filter results by status">
        <button class="btn btn-sm filter-btn active" data-filter="all" aria-pressed="true">All</button>
        <button class="btn btn-sm filter-btn" data-filter="identical" aria-pressed="false">Identical</button>
        <button class="btn btn-sm filter-btn" data-filter="different" aria-pressed="false">Different</button>
        <button class="btn btn-sm filter-btn" data-filter="unique" aria-pressed="false">Unique</button>
      </div>

      <!-- Pagination Info -->
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span id="paginationInfo" class="text-muted"></span>
        <div class="d-flex gap-2">
          <button id="prevPage" class="btn btn-sm btn-brand" disabled>Previous</button>
          <button id="nextPage" class="btn btn-sm btn-brand" disabled>Next</button>
        </div>
      </div>

      <!-- Results Table -->
      <div class="results-table" role="region" aria-live="polite" aria-label="Comparison results">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="sortable" data-sort="rsid" scope="col"><button class="btn btn-link p-0 border-0" aria-label="Sort by rsID">rsID ↕</button></th>
              <th class="sortable" data-sort="genes" scope="col"><button class="btn btn-link p-0 border-0" aria-label="Sort by Gene">Gene ↕</button></th>
              <th scope="col">Report A</th>
              <th scope="col">Report B</th>
              <th class="sortable" data-sort="status" scope="col"><button class="btn btn-link p-0 border-0" aria-label="Sort by Status">Status ↕</button></th>
            </tr>
          </thead>
          <tbody id="resultsBody">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    /*
     * Promethease Cross-Report Comparison Tool
     * Allows users to compare SNP findings between different report versions
     * Supports: 2026 John Stinson and 2026 Trina Toohey reports
     */

    // Report data paths - maps report keys to JSON file locations
    const REPORT_DATA_PATHS = {
      '2026-promethease-john': '2026-promethease-john/promethease_data/Promethease_2026_03_03_genome_John_Stinson_Full_20260303020155_findings_2026.json',
      '2026-promethease-trina': '2026-promethease-trina/promethease_data/Promethease_2026_03_03_genome_Trina_Toohey_Full_20260303020155_findings_2026.json'
    };

    const REPORT_LABELS = {
      '2026-promethease-john': 'John Stinson (2026)',
      '2026-promethease-trina': 'Trina Toohey (2026)'
    };

    // State - cached report data to avoid re-parsing
    const reportCache = new Map();
    let comparisonResults = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const ITEMS_PER_PAGE = 50;
    let sortColumn = 'rsid';
    let sortDirection = 'asc';

    // DOM Elements
    const reportASelect = document.getElementById('reportA');
    const reportBSelect = document.getElementById('reportB');
    const compareBtn = document.getElementById('compareBtn');
    const loadingSection = document.getElementById('loadingSection');
    const errorSection = document.getElementById('errorSection');
    const resultsSection = document.getElementById('resultsSection');
    const errorMessage = document.getElementById('errorMessage');
    const resultsBody = document.getElementById('resultsBody');
    const exportBtn = document.getElementById('exportBtn');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const paginationInfo = document.getElementById('paginationInfo');

    // Enable/disable compare button based on selections
    function updateCompareButton() {
      compareBtn.disabled = !reportASelect.value || !reportBSelect.value || reportASelect.value === reportBSelect.value;
    }

    reportASelect.addEventListener('change', updateCompareButton);
    reportBSelect.addEventListener('change', updateCompareButton);

    // Load report data from JSON file (with caching)
    async function loadReportData(reportKey) {
      // Check cache first
      if (reportCache.has(reportKey)) {
        return reportCache.get(reportKey);
      }
      
      const path = REPORT_DATA_PATHS[reportKey];
      if (!path) {
        throw new Error(`No data path configured for ${reportKey}`);
      }
      
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load report data from ${path}`);
      }
      
      const data = await response.json();
      reportCache.set(reportKey, data);
      return data;
    }

    // Compare two genotypes - returns 'identical' or 'different'
    // Also handles interpretation changes when genotypes match but repute differs
    function compareGenotypes(genoA, genoB, reputeA, reputeB) {
      // Check for interpretation change (genotype same but repute different)
      if (genoA === genoB && reputeA !== reputeB) {
        return 'interpretation';
      }
      
      if (genoA === genoB) return 'identical';
      
      // Handle normalized comparison (e.g., AG vs GA)
      const normalize = (g) => g.split('').sort().join('');
      if (normalize(genoA) === normalize(genoB)) return 'identical';
      
      return 'different';
    }

    // Perform SNP comparison
    function compareReports(dataA, dataB) {
      const findingsA = dataA.findings || [];
      const findingsB = dataB.findings || [];
      
      // Build lookup maps by rsID
      const mapA = new Map(findingsA.map(f => [f.rsid, f]));
      const mapB = new Map(findingsB.map(f => [f.rsid, f]));
      
      const results = [];
      const allRsids = new Set([...mapA.keys(), ...mapB.keys()]);
      
      for (const rsid of allRsids) {
        const snpA = mapA.get(rsid);
        const snpB = mapB.get(rsid);
        
        let status, reportAValue, reportBValue;
        
        if (snpA && snpB) {
          // Present in both - compare genotypes and interpretation
          const comparison = compareGenotypes(snpA.genotype, snpB.genotype, snpA.repute, snpB.repute);
          if (comparison === 'interpretation') {
            status = 'different'; // Show as different so user notices the change
          } else {
            status = comparison === 'identical' ? 'identical' : 'different';
          }
          reportAValue = `${snpA.genotype} (${snpA.repute})`;
          reportBValue = `${snpB.genotype} (${snpB.repute})`;
        } else if (snpA) {
          // Only in A
          status = 'unique';
          reportAValue = `${snpA.genotype} (${snpA.repute})`;
          reportBValue = '-';
        } else {
          // Only in B
          status = 'unique';
          reportAValue = '-';
          reportBValue = `${snpB.genotype} (${snpB.repute})`;
        }
        
        results.push({
          rsid,
          genes: (snpA || snpB)?.genes?.join(', ') || '-',
          chromosome: (snpA || snpB)?.chromosome || '-',
          position: (snpA || snpB)?.position || '-',
          reportAValue,
          reportBValue,
          status
        });
      }
      
      // Sort by rsid
      results.sort((a, b) => a.rsid.localeCompare(b.rsid));
      
      return results;
    }

    // Filter results
    function getFilteredResults() {
      if (currentFilter === 'all') return comparisonResults;
      return comparisonResults.filter(r => r.status === currentFilter);
    }

    // Sort results
    function getSortedResults(filtered) {
      return [...filtered].sort((a, b) => {
        let valA = a[sortColumn];
        let valB = b[sortColumn];
        
        if (typeof valA === 'string') {
          valA = valA.toLowerCase();
          valB = valB.toLowerCase();
        }
        
        if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
        if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
        return 0;
      });
    }

    // Render table with pagination and empty state handling
    function renderTable() {
      const filtered = getFilteredResults();
      const sorted = getSortedResults(filtered);
      
      // Handle empty state
      if (sorted.length === 0) {
        resultsBody.innerHTML = `
          <tr>
            <td colspan="5" class="text-center py-4 text-muted">
              No SNPs match the current filter criteria.
            </td>
          </tr>
        `;
        paginationInfo.textContent = 'No results found';
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        return;
      }
      
      const totalPages = Math.ceil(sorted.length / ITEMS_PER_PAGE);
      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = sorted.slice(start, end);
      
      resultsBody.innerHTML = pageItems.map(item => `
        <tr>
          <td><strong>${item.rsid}</strong></td>
          <td>${item.genes}</td>
          <td>${item.reportAValue}</td>
          <td>${item.reportBValue}</td>
          <td>
            <span class="badge-status status-${item.status}">${item.status.charAt(0).toUpperCase() + item.status.slice(1)}</span>
          </td>
        </tr>
      `).join('');
      
      // Update pagination - handle edge case where start > length
      const displayStart = sorted.length > 0 ? start + 1 : 0;
      paginationInfo.textContent = `Showing ${displayStart}-${Math.min(end, sorted.length)} of ${sorted.length} results`;
      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = currentPage >= totalPages;
    }

    // Update summary counts
    function updateSummary() {
      const filtered = getFilteredResults();
      const identical = filtered.filter(r => r.status === 'identical').length;
      const different = filtered.filter(r => r.status === 'different').length;
      const unique = filtered.filter(r => r.status === 'unique').length;
      
      document.getElementById('identicalCount').textContent = identical;
      document.getElementById('differentCount').textContent = different;
      document.getElementById('uniqueCount').textContent = unique;
    }

    // Escape CSV cell value - handles quotes, commas, newlines properly
    function escapeCSVValue(value) {
      if (value === null || value === undefined) return '';
      const str = String(value);
      // If value contains comma, quote, or newline, wrap in quotes and escape internal quotes
      if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    // Export to CSV with proper escaping and metadata
    function exportToCSV() {
      const filtered = getFilteredResults();
      const reportALabel = REPORT_LABELS[reportASelect.value];
      const reportBLabel = REPORT_LABELS[reportBSelect.value];
      
      const headers = ['rsID', 'Gene', 'Chromosome', 'Position', 'Report A', 'Report B', 'Status'];
      const rows = filtered.map(r => [
        r.rsid,
        r.genes,
        r.chromosome,
        r.position,
        r.reportAValue,
        r.reportBValue,
        r.status
      ]);
      
      // Build CSV with proper escaping
      const csvContent = [
        `# Promethease Report Comparison`,
        `# Generated: ${new Date().toISOString()}`,
        `# ${reportALabel} vs ${reportBLabel}`,
        '',
        headers.map(escapeCSVValue).join(','),
        ...rows.map(row => row.map(escapeCSVValue).join(','))
      ].join('\n');
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `comparison_${reportASelect.value}_vs_${reportBSelect.value}_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Compare button click handler
    compareBtn.addEventListener('click', async () => {
      // Hide previous results
      resultsSection.classList.add('d-none');
      errorSection.classList.add('d-none');
      
      // Show loading
      loadingSection.classList.remove('d-none');
      
      try {
        // Load both reports
        const [dataA, dataB] = await Promise.all([
          loadReportData(reportASelect.value),
          loadReportData(reportBSelect.value)
        ]);
        
        // Compare
        comparisonResults = compareReports(dataA, dataB);
        
        // Reset state
        currentFilter = 'all';
        currentPage = 1;
        sortColumn = 'rsid';
        sortDirection = 'asc';
        
        // Update UI
        updateSummary();
        renderTable();
        
        // Show results
        loadingSection.classList.add('d-none');
        resultsSection.classList.remove('d-none');
        
        // Update filter button states
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === 'all');
        });
        
      } catch (error) {
        // Log error for debugging
        console.error('Comparison failed:', error);
        loadingSection.classList.add('d-none');
        errorMessage.textContent = error.message;
        errorSection.classList.remove('d-none');
      }
    });

    // Filter buttons - allow filtering by comparison status
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        currentPage = 1;
        
        document.querySelectorAll('.filter-btn').forEach(b => {
          const isActive = b.dataset.filter === currentFilter;
          b.classList.toggle('active', isActive);
          b.setAttribute('aria-pressed', isActive);
        });
        
        updateSummary();
        renderTable();
      });
    });

    // Sort handlers - toggle ascending/descending on column click
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const column = th.dataset.sort;
        if (sortColumn === column) {
          sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          sortColumn = column;
          sortDirection = 'asc';
        }
        renderTable();
      });
    });

    // Pagination handlers
    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
      }
    });

    nextPageBtn.addEventListener('click', () => {
      const filtered = getFilteredResults();
      const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
      if (currentPage < totalPages) {
        currentPage++;
        renderTable();
      }
    });

    // Export button
    exportBtn.addEventListener('click', exportToCSV);
  </script>
</body>
</html>
